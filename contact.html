<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact - AutoCare</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand text-warning" href="index.html">AutoCare</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Contact Header -->
<div class="hero text-white text-center">
  <div class="content py-5">
    <h1 class="text-warning">Contact Us</h1>
    <p>We’re here to help you</p>
  </div>
</div>

<!-- Contact Form -->
<div class="container py-5">
  <form id="bookingForm" class="p-4 bg-light rounded shadow">

    <h4 class="text-center mb-4">Book Your Service</h4>

    <div class="row">
      <div class="col-md-6 mb-3">
        <input type="text" id="name" class="form-control" placeholder="Full Name" required>
      </div>

      <div class="col-md-6 mb-3">
        <input type="tel" id="phone" class="form-control" placeholder="Phone Number" required>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <input type="text" id="carModel" class="form-control" placeholder="Car Model (e.g. BMW X5)" required>
      </div>

      <div class="col-md-6 mb-3">
        <select id="service" class="form-control" required>
          <option value="">Select Service Plan</option>
          <option>Essential Care - ₹1,499</option>
          <option>Premium Package - ₹4,999</option>
          <option>Velocity Elite - ₹12,999</option>
        </select>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6 mb-3">
        <input type="date" id="date" class="form-control" required>
      </div>

      <div class="col-md-6 mb-3">
        <input type="time" id="time" class="form-control" required>
      </div>
    </div>

    <div class="mb-3">
      <select id="payment" class="form-control" required>
        <option value="">Select Payment Method</option>
        <option>UPI</option>
        <option>Credit/Debit Card</option>
        <option>Cash</option>
      </select>
    </div>

    <button type="submit" class="btn btn-warning w-100">Confirm Booking</button>

  </form>

  <div id="confirmation" class="text-center text-success mt-3"></div>
</div>

<!-- Extra Info -->
<div class="container text-center py-4 text-white">
  <p>📍 Location: Hyderabad</p>
  <p>📞 Phone: +91 98765 43210</p>
</div>

<!-- Footer -->
<footer class="bg-dark text-white text-center p-3 mt-5">
  <p>© 2026 AutoCare</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.getElementById("bookingForm").addEventListener("submit", function(e) {
  e.preventDefault();

  const bookingData = {
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    carModel: document.getElementById("carModel").value,
    service: document.getElementById("service").value,
    date: document.getElementById("date").value,
    time: document.getElementById("time").value,
    payment: document.getElementById("payment").value
  };

  localStorage.setItem("booking", JSON.stringify(bookingData));

  alert("✅ Booking Confirmed!");
  document.getElementById("bookingForm").reset();
});
</script>

</body>
</html>
